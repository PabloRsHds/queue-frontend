<!-- Seção de Cadastro de Serviço -->
<ng-container>
  <div class="dept-register-service-container">
    <button class="dept-register-service-close" aria-label="Fechar" (click)="openRegisterService.set(false)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
  <h1 class="section-title">Novo Serviço</h1>
  <p class="section-desc">Associe um serviço a um departamento existente.</p>

  <form [formGroup]="serviceForm" (ngSubmit)="onSubmitService()">
    <div class="form-group">
      <label class="form-label">Departamento *</label>
      <select class="form-select" formControlName="departmentName" required>
        <option value="">Selecione um departamento</option>
        <option *ngFor="let dept of departments()">
          {{ dept.name }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Nome do Serviço *</label>
      <input
        type="text"
        class="form-input"
        formControlName="name"
        placeholder="Ex: Entregar os documentos"
        required>
    </div>

    <div class="form-group">
      <label class="form-label">Código</label>
      <input
        type="text"
        class="form-input"
        formControlName="code"
        placeholder="Ex: DCM">
    </div>

    <div class="form-group">
      <label class="form-label">Descrição</label>
      <textarea
        class="form-textarea"
        formControlName="description"
        placeholder="Descrição do serviço..."></textarea>
    </div>

    <button type="submit" class="btn-primary" [disabled]="serviceForm.invalid">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
        <polyline points="17 21 17 13 7 13 7 21"></polyline>
        <polyline points="7 3 7 8 15 8"></polyline>
      </svg>
      Cadastrar Serviço
    </button>
  </form>
</ng-container>
