<!-- SERVIÇOS PAGE -->
<div id="page-servicos" class="fade-in" style="padding:32px;">
  <div style="margin-bottom:24px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <a href="#" onclick="navigateTo('dashboard')" style="color:#64748b;font-size:13px;text-decoration:none;">Início</a>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" style="display:inline;vertical-align:middle;"><polyline points="9 18 15 12 9 6"/></svg>
      <span style="color:#1e293b;font-size:13px;font-weight:600;">Serviços</span>
    </div>
    <h1 style="font-size:22px;font-weight:700;color:#1e293b;">Serviços</h1>
  </div>

  <!-- Stats Cards -->
  <div class="stats-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
    <div class="stat-card">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:44px;height:44px;background:#dcfce7;border-radius:10px;display:flex;align-items:center;justify-content:center;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div>
          <div style="font-size:22px;font-weight:700;color:#1e293b;">18</div>
          <div style="font-size:12px;color:#64748b;">Total de serviços cadastrados</div>
        </div>
      </div>
    </div>
    <div class="stat-card">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:44px;height:44px;background:#dcfce7;border-radius:10px;display:flex;align-items:center;justify-content:center;">
          <div style="width:12px;height:12px;background:#16a34a;border-radius:50%;"></div>
        </div>
        <div>
          <div style="font-size:22px;font-weight:700;color:#1e293b;">16</div>
          <div style="font-size:12px;color:#64748b;">Ativos</div>
          <div style="font-size:11px;color:#16a34a;">89% do total</div>
        </div>
      </div>
    </div>
    <div class="stat-card">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:44px;height:44px;background:#f1f5f9;border-radius:10px;display:flex;align-items:center;justify-content:center;">
          <div style="width:12px;height:12px;background:#94a3b8;border-radius:50%;"></div>
        </div>
        <div>
          <div style="font-size:22px;font-weight:700;color:#1e293b;">2</div>
          <div style="font-size:12px;color:#64748b;">Inativos</div>
          <div style="font-size:11px;color:#94a3b8;">11% do total</div>
        </div>
      </div>
    </div>
    <div class="stat-card" style="padding:0;border:none;background:none;box-shadow:none;">
      <div class="new-service-card" onclick="openModal()" style="width:100%;height:100%;">
        <div class="new-service-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div>
          <div class="new-service-text">Novo Serviço</div>
          <div class="new-service-sub">Cadastrar um novo serviço</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Services Table -->
  <div class="section-card">
    <div class="section-body">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div style="flex:1;position:relative;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Buscar serviço..." style="width:100%;padding:10px 14px 10px 40px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;outline:none;" oninput="filterServices()">
        </div>
        <button class="btn-secondary" style="display:flex;align-items:center;gap:8px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Filtros
        </button>
      </div>

      <div class="table-header" style="padding-bottom:12px;">
        <span>Serviço</span>
        <span>Código</span>
        <span>Departamento</span>
        <span>Tempo médio</span>
        <span>Status</span>
        <span style="text-align:right;">Ações</span>
      </div>

      <div id="services-list"></div>
    </div>
    <div style="padding:16px 24px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <span id="showing-text" style="font-size:13px;color:#64748b;">Mostrando 1 a 5 de 18 serviços</span>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="pagination" style="display:flex;align-items:center;gap:8px;">
          <button><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button class="active">1</button>
          <button>2</button>
          <button>3</button>
          <button>4</button>
          <button><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:13px;color:#64748b;">5 por página</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
    </div>
  </div>
</div>
