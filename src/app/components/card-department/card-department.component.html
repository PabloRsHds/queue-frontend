<div class="dept-modal-overlay">
  <div class="dept-modal">
    <div class="dept-modal-top">
      <h2>{{ modalTitle }}</h2>
      <button class="dept-modal-close" (click)="closeCardDepartment()" aria-label="Fechar">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="dept-modal-body">
      <!-- Left Sidebar -->
      <div class="modal-sidebar">
        <div
          class="modal-sidebar-item"
          [class.active]="currentSection() === 'departamento'"
          (click)="switchSection('departamento')">
          <svg viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
          </svg>
          Departameno
          <span class="badge">{{ totalElements() }}</span>
        </div>
        <div
          class="modal-sidebar-item"
          [class.active]="currentSection() === 'servico'"
          (click)="switchSection('servico')">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          Serviços
        </div>
        <div
          class="modal-sidebar-item"
          [class.active]="currentSection() === 'config'"
          (click)="switchSection('config')">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
          Config
        </div>
      </div>

      <!-- Right Content -->
      <div class="modal-content">
        <!-- Seção de Registro de Departamento -->

        <div>
          <ng-container class="buttons" *ngIf="showButtonsSectionDepartment()">
            <button class="btn-secondary" type="button" (click)="openRegisterDepartment.set(true)">Registrar departamento</button>
            <button class="btn-secondary" type="button" (click)="openTableDeparments.set(true)">Visualizar departamentos</button>
          </ng-container>

          <app-register-department
          *ngIf="openRegisterDepartment() && currentSection() === 'departamento'">
          </app-register-department>

          <app-table-departments
          *ngIf="openTableDeparments() && currentSection() === 'departamento'">
          </app-table-departments>
        </div>

        <div>
          <ng-container class="buttons" *ngIf="showButtonsSectionService()">
            <button class="btn-secondary" type="button" (click)="openRegisterService.set(true)">Registrar serviço</button>
            <button class="btn-secondary" type="button" (click)="openTableServices.set(true)">Visualizar serviços</button>
          </ng-container>

          <app-register-service
          *ngIf="openRegisterService() && currentSection() === 'servico'">
          </app-register-service>

          <app-table-services
          *ngIf="openTableServices() && currentSection() === 'servico'">
          </app-table-services>
        </div>

      </div>
    </div>

  </div>
</div>
