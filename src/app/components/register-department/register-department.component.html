<ng-container>
  <div class="dept-register-department-container">
    <button class="dept-register-department-close" aria-label="Fechar" (click)="openRegisterDepartment.set(false)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
  <h1 class="section-title">Novo Departamento</h1>
  <p class="section-desc">Preencha os campos abaixo para cadastrar um novo departamento.</p>

  <form [formGroup]="departmentForm" (ngSubmit)="onSubmitDepartment()">
    <div class="form-group">
      <label class="form-label">Nome do Departamento *</label>
      <input
        type="text"
        class="form-input"
        formControlName="name"
        placeholder="Ex: Departamento de RH"
        required>
    </div>

    <div class="form-group">
      <label class="form-label">Descrição</label>
      <textarea
        rows="5"
        class="form-textarea"
        formControlName="description"
        placeholder="Breve descrição do departamento..."></textarea>
    </div>

    <button type="submit" class="btn-primary" [disabled]="departmentForm.invalid">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
        <polyline points="17 21 17 13 7 13 7 21"></polyline>
        <polyline points="7 3 7 8 15 8"></polyline>
      </svg>
      Cadastrar Departamento
    </button>
  </form>
</ng-container>
